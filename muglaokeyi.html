<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Sargon Stats - Muğla Okeyi</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --primary-variant: #3700b3;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --danger: #cf6679;
            --success: #03dac6;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        html, body { 
            height: 100%; 
            width: 100%;
            position: fixed; 
            overflow-y: auto; 
            overflow-x: hidden;
            background-color: var(--bg-color); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
        }

        header { padding: 10px; background-color: var(--surface); text-align: center; border-bottom: 2px solid var(--primary); flex-shrink: 0;}
        header h1 { font-size: 1.1rem; margin-bottom: 2px; }
        header p { color: var(--text-muted); font-size: 0.8rem; }

        .scoreboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: var(--surface); text-align: center; flex-shrink: 0;}
        .player-col h3 { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2px; }
        .player-col .score { font-size: 1.3rem; font-weight: bold; color: var(--primary); }

        .input-area { 
            padding: 10px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            gap: 10px; 
            overflow: hidden; 
        }
        
        .input-box { background: var(--bg-color); border: 2px solid #333; border-radius: 8px; padding: 10px; text-align: center; font-size: 1.1rem; color: var(--text); cursor: pointer; transition: 0.2s; }
        .input-box.active { border-color: var(--primary); background: rgba(187, 134, 252, 0.1); box-shadow: 0 0 10px rgba(187, 134, 252, 0.3); }
        .input-box span { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3px; pointer-events: none;}
        .input-box .val { pointer-events: none; font-weight: bold;} 

        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

        .toggles { display: flex; gap: 8px; margin-top: 5px; }
        .toggle-btn { flex: 1; padding: 10px; background: var(--bg-color); border: 2px solid #333; color: var(--text-muted); border-radius: 8px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .toggle-btn.active { background: var(--danger); border-color: var(--danger); color: white; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 8px; background: var(--surface); padding-bottom: 15px; flex-shrink: 0;}
        .key-btn { background: #333; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; touch-action: manipulation; }
        .key-btn:active { background: #555; }
        .key-btn.special { background: var(--primary-variant); }
        .key-btn.danger { background: #8b0000; }
        
        .action-btn { grid-column: span 3; background: var(--success); color: #000; padding: 12px; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; border-radius: 8px; border: none; cursor: pointer; margin-top: 4px; touch-action: manipulation;}
        .action-btn:active { background: #018786; }

        #game-over { display: none; position: fixed; inset: 0; background: var(--bg-color); flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        #game-over h2 { font-size: 2.5rem; color: var(--primary); margin-bottom: 20px;}
        #game-over p { font-size: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <h1>Sargon Stats: Muğla Okeyi</h1>
        <p id="round-display">El: 1 / 9</p>
    </header>

    <div class="scoreboard">
        <div class="player-col"><h3>1. Oyuncu</h3><div class="score" id="score-p1">0</div></div>
        <div class="player-col"><h3>2. Oyuncu</h3><div class="score" id="score-p2">0</div></div>
        <div class="player-col"><h3>3. Oyuncu</h3><div class="score" id="score-p3">0</div></div>
        <div class="player-col"><h3>4. Oyuncu</h3><div class="score" id="score-p4">0</div></div>
    </div>

    <div class="input-area" id="game-area">
        <div class="input-box active" data-target="yer" id="input-yer">
            <span>Yer Değeri</span>
            <div class="val" id="val-yer">-</div>
        </div>
        <div class="input-grid">
            <div class="input-box" data-target="p1" id="input-p1"><span>1. Oyuncu Ceza</span><div class="val" id="val-p1">-</div></div>
            <div class="input-box" data-target="p2" id="input-p2"><span>2. Oyuncu Ceza</span><div class="val" id="val-p2">-</div></div>
            <div class="input-box" data-target="p3" id="input-p3"><span>3. Oyuncu Ceza</span><div class="val" id="val-p3">-</div></div>
            <div class="input-box" data-target="p4" id="input-p4"><span>4. Oyuncu Ceza</span><div class="val" id="val-p4">-</div></div>
        </div>
        <div class="toggles">
            <button type="button" class="toggle-btn" data-toggle="cift" id="btn-cift">Çiftten Bitti</button>
            <button type="button" class="toggle-btn" data-toggle="okey" id="btn-okey">Okey Attı</button>
        </div>
    </div>

    <div class="keypad" id="keypad-area">
        <button type="button" class="key-btn" data-val="1">1</button>
        <button type="button" class="key-btn" data-val="2">2</button>
        <button type="button" class="key-btn" data-val="3">3</button>
        <button type="button" class="key-btn" data-val="4">4</button>
        <button type="button" class="key-btn" data-val="5">5</button>
        <button type="button" class="key-btn" data-val="6">6</button>
        <button type="button" class="key-btn" data-val="7">7</button>
        <button type="button" class="key-btn" data-val="8">8</button>
        <button type="button" class="key-btn" data-val="9">9</button>
        <button type="button" class="key-btn danger" data-val="C">C</button>
        <button type="button" class="key-btn" data-val="0">0</button>
        <button type="button" class="key-btn special" data-val="-10">-10</button>
        <button type="button" class="action-btn" id="btn-next">SONRAKİ EL</button>
    </div>

    <div id="game-over">
        <h2>Maç Bitti!</h2>
        <p id="winner-text"></p>
        <button type="button" class="action-btn" style="margin-top: 30px; padding: 15px 30px;" id="btn-restart">Yeni Oyun</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtzfLUK2paSlyY1wF7WlLhLQLpUztJogg",
            authDomain: "sargonstats.firebaseapp.com",
            projectId: "sargonstats",
            storageBucket: "sargonstats.firebasestorage.app",
            messagingSenderId: "334323498833",
            appId: "1:334323498833:web:f6ddc5a63b940905da5d70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const roomRef = doc(db, "rooms", "MxIaeR7QokYg9Dy2G7vt");

        document.addEventListener('DOMContentLoaded', () => {
            let currentRound = 1;
            const maxRounds = 9;
            let activeField = 'yer';
            
            let grandTotals = { p1: 0, p2: 0, p3: 0, p4: 0 };
            let currentInputs = { yer: '', p1: '', p2: '', p3: '', p4: '' };
            let toggles = { cift: false, okey: false };

            // --- FİREBASE CANLI DİNLEME ---
            onSnapshot(roomRef, (docSnap) => {
                if (docSnap.exists()) {
                    const masaVerisi = docSnap.data();
                    console.log("🔥 Firebase'den Gelen Güncel Durum:", masaVerisi);
                    
                    // 1. Eli ve Buton Yazısını Güncelle
                    currentRound = masaVerisi.currentRound || 1;
                    document.getElementById('round-display').innerText = `El: ${currentRound} / ${maxRounds}`;
                    
                    if (currentRound >= maxRounds) {
                        document.getElementById('btn-next').innerText = "BİTİR VE SONUÇLAR";
                    } else {
                        document.getElementById('btn-next').innerText = "SONRAKİ EL";
                    }
                    
                    // 2. Oyuncu Skorlarını Güncelle (Eğer boşsa 0 kabul et)
                    grandTotals.p1 = masaVerisi.p1Score || 0;
                    grandTotals.p2 = masaVerisi.p2Score || 0;
                    grandTotals.p3 = masaVerisi.p3Score || 0;
                    grandTotals.p4 = masaVerisi.p4Score || 0;

                    document.getElementById('score-p1').innerText = grandTotals.p1;
                    document.getElementById('score-p2').innerText = grandTotals.p2;
                    document.getElementById('score-p3').innerText = grandTotals.p3;
                    document.getElementById('score-p4').innerText = grandTotals.p4;

                    // 3. Yer Değerini Güncelle (Eğer o an yazmıyorsak)
                    if(activeField !== 'yer' || currentInputs['yer'] === '') {
                        let okunanYer = masaVerisi.yerDegeri || 0;
                        document.getElementById('val-yer').innerText = okunanYer === 0 ? '-' : okunanYer;
                    }
                    
                } else {
                    console.log("❌ Böyle bir masa bulunamadı!");
                }
            });

            // --- ARAYÜZ VE BUTON KODLARI ---
            document.querySelectorAll('.input-box').forEach(box => {
                box.addEventListener('click', function() {
                    document.querySelectorAll('.input-box').forEach(el => el.classList.remove('active'));
                    this.classList.add('active');
                    activeField = this.getAttribute('data-target');
                });
            });

            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    let type = this.getAttribute('data-toggle');
                    toggles[type] = !toggles[type];
                    if(toggles[type]) this.classList.add('active');
                    else this.classList.remove('active');
                });
            });

            document.querySelectorAll('.key-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    let key = this.getAttribute('data-val');
                    if (key === 'C') {
                        currentInputs[activeField] = '';
                    } else if (key === '-10') {
                        currentInputs[activeField] = '-10';
                    } else {
                        if(currentInputs[activeField] === '-10') currentInputs[activeField] = '';
                        currentInputs[activeField] += key;
                    }
                    updateDisplay();
                });
            });

            // --- HESAPLA VE FİREBASE'E GÖNDER ---
            document.getElementById('btn-next').addEventListener('click', async () => {
                let yerDegeri = parseInt(currentInputs.yer) || 0;
                let activeTogglesCount = (toggles.cift ? 1 : 0) + (toggles.okey ? 1 : 0);
                let loserMult = 1, winnerVal = -10;

                if (activeTogglesCount === 1) { loserMult = 2; winnerVal = -100; } 
                else if (activeTogglesCount === 2) { loserMult = 4; winnerVal = -200; }

                const players = ['p1', 'p2', 'p3', 'p4'];
                players.forEach(p => {
                    let val = parseInt(currentInputs[p]);
                    if (isNaN(val)) val = 0;

                    if (val === -10) { grandTotals[p] += (winnerVal * yerDegeri); } 
                    else if (val > 0) { grandTotals[p] += (val * loserMult * yerDegeri); }
                });

                currentInputs = { yer: '', p1: '', p2: '', p3: '', p4: '' };
                toggles = { cift: false, okey: false };
                document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
                updateDisplay();
                
                document.querySelectorAll('.input-box').forEach(el => el.classList.remove('active'));
                document.getElementById('input-yer').classList.add('active');
                activeField = 'yer';

                currentRound++;

                // --- GÜNCELLENEN SKORLARI DA FİREBASE'E GÖNDER ---
                try {
                    await updateDoc(roomRef, {
                        currentRound: currentRound,
                        yerDegeri: 0, // YENİ EL İÇİN YER DEĞERİNİ SIFIRLIYORUZ
                        p1Score: grandTotals.p1,
                        p2Score: grandTotals.p2,
                        p3Score: grandTotals.p3,
                        p4Score: grandTotals.p4
                    });
                    console.log("✅ Veriler ve Skorlar Firebase'e başarıyla gönderildi!");
                } catch (error) {
                    console.error("❌ Firebase'e veri gönderilirken hata:", error);
                }

                if (currentRound > maxRounds) {
                    document.getElementById('game-area').style.display = 'none';
                    document.getElementById('keypad-area').style.display = 'none';
                    
                    let minScore = Math.min(grandTotals.p1, grandTotals.p2, grandTotals.p3, grandTotals.p4);
                    let winners = players.filter(p => grandTotals[p] === minScore).map(p => p.replace('p', '') + '. Oyuncu');
                    document.getElementById('winner-text').innerText = "Şampiyon: " + winners.join(" & ") + "\nSkor: " + minScore;
                    document.getElementById('game-over').style.display = 'flex';
                }
            });

            // --- YENİ OYUN (FİREBASE SIFIRLAMA) ---
            document.getElementById('btn-restart').addEventListener('click', async () => {
                try {
                    await updateDoc(roomRef, {
                        currentRound: 1,
                        yerDegeri: 0,
                        p1Score: 0,
                        p2Score: 0,
                        p3Score: 0,
                        p4Score: 0
                    });
                    console.log("✅ Yeni oyun için veritabanı sıfırlandı!");
                    location.reload(); 
                } catch (error) {
                    console.error("❌ Sıfırlama sırasında hata:", error);
                }
            });

            // --- GÖRSEL GÜNCELLEME DÜZELTİLDİ ---
            function updateDisplay() {
                const fields = ['yer', 'p1', 'p2', 'p3', 'p4'];
                fields.forEach(f => {
                    if (currentInputs[f] !== '') {
                        document.getElementById('val-' + f).innerText = currentInputs[f];
                    } else {
                        document.getElementById('val-' + f).innerText = '-';
                    }
                });
            }
        });
    </script>
</body>
</html>
